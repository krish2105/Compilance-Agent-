name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests
      - name: Build synthetic dataset
        working-directory: backend
        run: python -m app.data_pipeline
      - name: Train GNN detector
        working-directory: backend
        run: python -m gnn.train
      - name: Run tests
        working-directory: backend
        env:
          LLM_PROVIDER: offline
        run: pytest -q
      - name: Evaluation gate (eval-driven development)
        working-directory: backend
        env:
          LLM_PROVIDER: offline
        run: python -m eval.run_eval
      - name: Responsible-AI report (red-team + fairness + golden set)
        working-directory: backend
        env:
          LLM_PROVIDER: offline
        run: python -m eval.responsible_ai
      - name: LLM-as-judge answer-quality gate (only if a Gemini key is configured)
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        working-directory: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: gemini
        run: python -m eval.judge --ci

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint || true   # lint is advisory; build is the gate
      - name: Type-check + build
        working-directory: frontend
        run: npm run build
