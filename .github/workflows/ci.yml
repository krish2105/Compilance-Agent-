name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests
      - name: Build synthetic dataset
        working-directory: backend
        run: python -m app.data_pipeline
      - name: Train GNN detector
        working-directory: backend
        run: python -m gnn.train
      - name: Run tests (with coverage)
        working-directory: backend
        env:
          LLM_PROVIDER: offline
        run: pytest -q --cov=app --cov=gnn --cov-report=term --cov-report=xml
      - name: Evaluation gate (eval-driven development)
        working-directory: backend
        env:
          LLM_PROVIDER: offline
        run: python -m eval.run_eval
      - name: Responsible-AI report (red-team + fairness + golden set)
        working-directory: backend
        env:
          LLM_PROVIDER: offline
        run: python -m eval.responsible_ai
      - name: LLM-as-judge answer-quality gate (only if a Gemini key is configured)
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        working-directory: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: gemini
        run: python -m eval.judge --ci

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: ESLint
        working-directory: frontend
        run: npm run lint || true   # lint is advisory; build is the gate
      - name: Type-check + build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E · Playwright (desktop + mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Backend deps + data
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/python -m app.data_pipeline
          .venv/bin/python -m gnn.train
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend deps + browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build (e2e config) + run Playwright
        working-directory: frontend
        run: |
          npm run build:e2e
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
