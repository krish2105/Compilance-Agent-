<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9AA0A6"/>
    </marker>
    <style>
      .t{fill:#14161A} .m{fill:#565B62} .s{fill:#8A9099}
      .lbl{font-weight:700;font-size:15px}
      .sub{font-size:11.5px}
      .card{fill:#FFFFFF;stroke:#E4E6E9;stroke-width:1.4}
      .band{fill:#F1F5F3;stroke:#E4E6E9;stroke-width:1.4}
      .agent{fill:#FFFFFF;stroke:#059669;stroke-width:1.4}
    </style>
  </defs>

  <rect width="1200" height="780" fill="#F6F7F8"/>

  <!-- Title -->
  <text x="40" y="48" class="t" font-size="26" font-weight="800">ComplianceAgent — Architecture</text>
  <text x="40" y="72" class="m" font-size="13">Multi-agent AML/KYC case-investigation copilot · evidence-cited drafts · human-in-the-loop governance · $0/month</text>

  <!-- Frontend -->
  <rect x="40" y="96" width="1120" height="70" rx="14" fill="#E6F4EF" stroke="#059669" stroke-width="1.4"/>
  <text x="64" y="124" class="t lbl">Frontend — React + TypeScript + Tailwind (Vercel, installable PWA)</text>
  <text x="64" y="147" class="m sub">Case queue · Dashboard · Import wizard · Team · Billing · ⌘K palette · i18n/RTL · resizable panes · light/dark</text>

  <!-- Backend -->
  <rect x="40" y="182" width="1120" height="66" rx="14" class="card"/>
  <text x="64" y="209" class="t lbl">Backend — FastAPI (Render)</text>
  <text x="64" y="231" class="m sub">AuthN / RBAC + JWT (2FA) · rate-limit · security headers  →  /api/auth · /api/cases · /api/ingest · /api/dashboard · /api/admin</text>

  <!-- Agents pipeline -->
  <text x="40" y="290" class="t lbl">Multi-agent pipeline — deterministic LangGraph state machine</text>
  <g>
    <rect x="40"   y="304" width="132" height="52" rx="10" class="agent"/>
    <rect x="184"  y="304" width="132" height="52" rx="10" class="agent"/>
    <rect x="328"  y="304" width="132" height="52" rx="10" class="agent"/>
    <rect x="472"  y="304" width="132" height="52" rx="10" class="agent"/>
    <rect x="616"  y="304" width="132" height="52" rx="10" class="agent"/>
    <rect x="760"  y="304" width="132" height="52" rx="10" class="agent"/>
    <rect x="904"  y="304" width="132" height="52" rx="10" class="agent"/>
    <rect x="1048" y="304" width="112" height="52" rx="10" class="agent"/>
  </g>
  <g class="t" font-size="12" font-weight="600" text-anchor="middle">
    <text x="106"  y="335">Evidence</text>
    <text x="250"  y="335">Sanctions</text>
    <text x="394"  y="335">GNN detect</text>
    <text x="538"  y="335">Typology</text>
    <text x="682"  y="335">RAG context</text>
    <text x="826"  y="335">Narrative</text>
    <text x="970"  y="335">Verifier</text>
    <text x="1104" y="331">Finalize +</text>
    <text x="1104" y="346">risk</text>
  </g>
  <g stroke="#059669" stroke-width="1.6" marker-end="url(#arrow)">
    <line x1="172" y1="330" x2="182" y2="330"/>
    <line x1="316" y1="330" x2="326" y2="330"/>
    <line x1="460" y1="330" x2="470" y2="330"/>
    <line x1="604" y1="330" x2="614" y2="330"/>
    <line x1="748" y1="330" x2="758" y2="330"/>
    <line x1="892" y1="330" x2="902" y2="330"/>
    <line x1="1036" y1="330" x2="1046" y2="330"/>
  </g>
  <!-- verifier retry -->
  <path d="M970,356 C900,392 895,392 826,358" fill="none" stroke="#D97706" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="898" y="392" class="s" font-size="10.5" text-anchor="middle" fill="#B45309">bounded retry</text>

  <!-- Data & ML -->
  <text x="40" y="430" class="t lbl">Data &amp; ML</text>
  <g>
    <rect x="40"   y="444" width="212" height="70" rx="10" class="band"/>
    <rect x="268"  y="444" width="230" height="70" rx="10" class="band"/>
    <rect x="514"  y="444" width="196" height="70" rx="10" class="band"/>
    <rect x="726"  y="444" width="224" height="70" rx="10" class="band"/>
    <rect x="966"  y="444" width="194" height="70" rx="10" class="band"/>
  </g>
  <g class="t" font-size="12.5" text-anchor="middle">
    <text x="146" y="472" font-weight="700">DuckDB</text>
    <text x="146" y="491" class="m sub">transactions / KYC / cases</text>

    <text x="383" y="472" font-weight="700">SQLAlchemy store</text>
    <text x="383" y="490" class="m sub">tenants · users · reviews</text>
    <text x="383" y="505" class="m sub">audit · uploads (PG / SQLite)</text>

    <text x="612" y="472" font-weight="700">Regulatory KB</text>
    <text x="612" y="491" class="m sub">hybrid BM25 + n-gram RAG</text>

    <text x="838" y="472" font-weight="700">From-scratch GNN</text>
    <text x="838" y="491" class="m sub">NumPy GraphSAGE, calibrated</text>

    <text x="1063" y="472" font-weight="700">Live sanctions</text>
    <text x="1063" y="490" class="m sub">OFAC + UN · 8k entities</text>
    <text x="1063" y="505" class="m sub">blocking index</text>
  </g>

  <!-- LLM + governance -->
  <text x="40" y="556" class="t lbl">LLM (provider-agnostic, graceful degradation)</text>
  <g>
    <rect x="40"  y="570" width="120" height="46" rx="23" fill="#E6F4EF" stroke="#059669" stroke-width="1.4"/>
    <rect x="176" y="570" width="120" height="46" rx="23" fill="#E6F4EF" stroke="#059669" stroke-width="1.4"/>
    <rect x="312" y="570" width="210" height="46" rx="23" fill="#E6F4EF" stroke="#059669" stroke-width="1.4"/>
  </g>
  <g fill="#065F46" font-size="12.5" font-weight="700" text-anchor="middle">
    <text x="100" y="598">Gemini</text>
    <text x="236" y="598">Groq</text>
    <text x="417" y="598">Deterministic offline</text>
  </g>
  <g stroke="#9AA0A6" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#arrow)">
    <line x1="160" y1="593" x2="174" y2="593"/>
    <line x1="296" y1="593" x2="310" y2="593"/>
  </g>

  <rect x="560" y="570" width="292" height="46" rx="10" fill="#FEF3E6" stroke="#D97706" stroke-width="1.4"/>
  <text x="706" y="598" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">Human approval gate — enforced in code</text>

  <rect x="880" y="570" width="280" height="46" rx="10" fill="#E6F4EF" stroke="#059669" stroke-width="1.4"/>
  <text x="1020" y="598" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">SAR / STR + goAML XML export</text>

  <!-- Cross-cutting -->
  <rect x="40" y="646" width="1120" height="96" rx="14" class="card"/>
  <text x="64" y="674" class="t lbl">Cross-cutting</text>
  <text x="64" y="699" class="m sub">Prometheus /metrics + Grafana  ·  Eval gates: red-team (11 attacks) · fairness audit · LLM-judge CI gate</text>
  <text x="64" y="720" class="m sub">85+ unit tests (76% coverage) · 12 Playwright E2E (desktop + mobile) · Locust load testing  ·  provider-agnostic, $0/month by default</text>

  <!-- vertical flow connectors -->
  <g stroke="#C7CBD1" stroke-width="1.4" marker-end="url(#arrow)">
    <line x1="600" y1="166" x2="600" y2="180"/>
    <line x1="600" y1="248" x2="600" y2="300"/>
  </g>
</svg>
