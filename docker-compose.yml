# Local dev orchestration for the ComplianceAgent backend.
# The frontend runs via `npm run dev` (Vite) — see README. This compose file
# builds and serves the Dockerized backend (which builds the dataset at image
# build time) on port 8099.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: complianceagent-backend
    container_name: complianceagent-backend
    ports:
      - "8099:8000"
    environment:
      # Runs at $0 with no API keys via the deterministic offline provider.
      LLM_PROVIDER: ${LLM_PROVIDER:-offline}
      BACKEND_API_KEY: ${BACKEND_API_KEY:-dev-local-key}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
