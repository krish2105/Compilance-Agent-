[tool.ruff]
line-length = 100
target-version = "py39"
exclude = [".venv", "data"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # line length handled softly; long f-strings in narratives are fine

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
filterwarnings = ["ignore::DeprecationWarning", "ignore::FutureWarning"]
testpaths = ["tests"]
