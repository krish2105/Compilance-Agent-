# Render blueprint for the ComplianceAgent backend.
# Deploy: Render dashboard → New → Blueprint → connect this repo, or
#         render deploys automatically from this file when the repo is linked.
services:
  - type: web
    name: complianceagent-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free            # free tier sleeps on inactivity (cold start ~30-60s)
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: true
    # --- Horizontal scaling (paid tiers) ---
    # The backend is STATELESS when Redis + Postgres are attached (rate-limit,
    # throttle, cache and results are all shared) — so `numInstances` can be raised
    # and load-balanced safely. GET /api/ready reports horizontally_scalable=true.
    # numInstances: 3        # uncomment on a paid instance type to scale out
    # For multi-region, run this blueprint per region + a Postgres read-replica.
    envVars:
      # Primary provider is Groq (Llama 3.3 70B, free tier); it AUTOMATICALLY falls
      # back to the deterministic offline provider until GROQ_API_KEY is set in the
      # Render dashboard — so the service is live at $0 immediately and turns
      # "generative" the moment you add a free Groq key (https://console.groq.com/keys).
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_ENABLE_FALLBACK
        value: "true"
      # Hallucination guardrail: NLI faithfulness check via HuggingFace's free
      # Inference API. No-ops until HUGGINGFACE_TOKEN is set (deterministic guardrails
      # still stand); costs no server RAM (model runs on HF, not the 512MB instance).
      - key: VERIFIER_ENTAILMENT
        value: "true"
      - key: VECTOR_BACKEND
        value: memory     # zero-dependency RAG store; fits the free-tier 512MB
      - key: PYTHON_VERSION
        value: "3.11"
      - key: BACKEND_API_KEY
        value: "compliance-demo-2026"   # demo-only public gate over synthetic data (safe to publish)
      - key: CORS_ORIGINS
        value: "*"        # header-based auth (no cookies), so wildcard CORS is safe here
      # --- Durable data (optional but recommended for real use) ---
      # Without these the app runs at $0 on an EPHEMERAL SQLite file + in-memory cache
      # (data resets on each restart/redeploy). Set them in the Render dashboard to a
      # FREE managed Postgres (e.g. Neon / Supabase) and Redis (e.g. Upstash) and all
      # tenants, users, reviews and the audit trail SURVIVE restarts. No code change.
      - key: DATABASE_URL
        sync: false       # e.g. postgresql://user:pass@ep-xxx.neon.tech/db  (Neon free)
      - key: REDIS_URL
        sync: false       # e.g. rediss://default:pass@xxx.upstash.io:6379   (Upstash free)
      - key: GROQ_API_KEY
        sync: false       # set in the Render dashboard to activate live Groq narratives
      - key: HUGGINGFACE_TOKEN
        sync: false       # set in the Render dashboard to activate the NLI faithfulness guardrail
      - key: GEMINI_API_KEY
        sync: false       # optional secondary provider
      # --- Observability (optional): set these to stream traces to Langfuse ---
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
